name: release

# Build and publish the online + airgapped bundles whenever a version tag is pushed.
# The rantaiclaw binary is ALWAYS pulled from the latest RantAI-dev/RantAIClaw release;
# claw-ui comes from `rantaiclaw ui install` (the signed claw-ui release that rantaiclaw pins —
# baked into the airgapped bundle, fetched on-demand online).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve release tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2

      - name: Fetch latest rantaiclaw (x86_64 linux gnu)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # newest published release (prereleases/alpha count; drafts have no downloadable assets)
          RC_TAG="$(gh api repos/RantAI-dev/RantAIClaw/releases --jq '[.[] | select(.draft==false)][0].tag_name')"
          echo "rantaiclaw release: $RC_TAG"
          gh release download "$RC_TAG" -R RantAI-dev/RantAIClaw \
            -p 'rantaiclaw-x86_64-unknown-linux-gnu.tar.gz' -p 'SHA256SUMS' -D rc
          ( cd rc && grep 'rantaiclaw-x86_64-unknown-linux-gnu.tar.gz' SHA256SUMS | sha256sum -c - )
          tar xzf rc/rantaiclaw-x86_64-unknown-linux-gnu.tar.gz -C rc
          RC_BIN="$(find "$PWD/rc" -maxdepth 2 -name rantaiclaw -type f | head -1)"
          chmod +x "$RC_BIN"
          "$RC_BIN" --version
          echo "RC_BIN=$RC_BIN" >> "$GITHUB_ENV"

      - name: Build bundles (online + airgapped)
        run: |
          set -euo pipefail
          bash release/build-bundle.sh "$RC_BIN" "${{ steps.tag.outputs.tag }}"
          bash release/pack-airgapped.sh "$RC_BIN" "${{ steps.tag.outputs.tag }}"
          ls -lh dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          RC_VER="$(tar xzOf "dist/rantai-copilot-${TAG}-x86_64-linux.tar.gz" "rantai-copilot-${TAG}-x86_64-linux/VERSION" 2>/dev/null | grep -m1 '^rantaiclaw=' | cut -d= -f2-)"
          CLAW_UI_VER="$(tar xzOf "dist/rantai-copilot-airgapped-${TAG}-x86_64-linux.tar.gz" "rantai-copilot-airgapped-${TAG}-x86_64-linux/VERSION" 2>/dev/null | grep -m1 '^claw_ui=' | cut -d= -f2-)"
          {
            echo "Automated build — hypervisor skill + online/airgapped installers."
            echo ""
            echo "Bundled rantaiclaw: ${RC_VER} · claw-ui ${CLAW_UI_VER:-pinned}"
            echo ""
            echo "- Online: \`curl -fsSL https://raw.githubusercontent.com/$REPO/main/get.sh | bash\`"
            echo "- Airgapped: download the \`-airgapped-\` tarball, then \`./setup-airgapped.sh\`"
            echo ""
            echo "Linux x86_64 (glibc). Verify with the \`.sha256\` sidecars."
          } > notes.md
          if gh release create "$TAG" --title "$TAG" --notes-file notes.md \
               dist/*.tar.gz dist/*.tar.gz.sha256; then
            echo "created release $TAG"
          else
            gh release upload "$TAG" dist/*.tar.gz dist/*.tar.gz.sha256 --clobber
            gh release edit "$TAG" --notes-file notes.md
          fi
